<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1c1a16" />
  <title>GAME ROOM v1078</title>
  <link rel="manifest" href="manifest.json?v=1078" />
  <link rel="stylesheet" href="style.css?v=1078" />
</head>
<body>
  <main id="app"></main>

  <script>
    // v1078: czyszczenie starego cache/PWA, żeby nie odpalał się zapamiętany Typer.
    try {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs){ regs.forEach(function(r){ r.unregister(); }); });
      }
      if (window.caches) { caches.keys().then(function(keys){ keys.forEach(function(k){ caches.delete(k); }); }); }
    } catch(e) {}
  </script>
  <script src="firebase.js?v=1078"></script>
  <script src="app.js?v=1078"></script>
</body>
</html>
